<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockly Edit</title>
    <link rel="stylesheet" href="{cssUri}">
    <link rel="stylesheet" href="{experimentalCssUri}">
    <link rel="stylesheet" href="{shadowBlockCssUri}">
    <script>window.TOOLBOX_URL = '{toolboxUri}';</script>
    <script>window.CYBERBRICK_TOOLBOX_URL = '{cyberbrickToolboxUri}';</script>
    <script>window.TXT_TOOLBOX_URL = '{txtToolboxUri}';</script>
    <script>
        // 設定初始主題
        window.initialTheme = '{theme}' || 'light';

        window.languageManager = {
            currentLanguage: '{vscodeLanguage}', // 將由 extension.ts 注入
            messages: {},
            loadMessages: function (locale, messages) {
                this.messages[locale] = messages;

                // 自動同步翻譯到 Blockly.Msg
                this.syncToBlocklyMsg(locale, messages);

                // 觸發語言檔案載入事件
                window.dispatchEvent(new CustomEvent('messageLoaded', {
                    detail: { locale: locale }
                }));
            },
            getMessage: function (key, defaultValue) {
                const messages = this.messages[this.currentLanguage] || this.messages['en'];
                return messages[key] || defaultValue || key;
            },
            setLanguage: function (locale) {
                // 檢查語言檔案是否已載入
                if (!this.messages[locale]) {
                    console.warn(`Language ${locale} not loaded yet`);
                    return;
                }
                this.currentLanguage = locale;

                // 切換語言時也同步翻譯到 Blockly.Msg
                this.syncToBlocklyMsg(locale, this.messages[locale]);

                // 觸發語言變更事件
                window.dispatchEvent(new CustomEvent('languageChanged', {
                    detail: { language: locale }
                }));
                // 重新渲染工作區
                if (Blockly && Blockly.getMainWorkspace()) {
                    Blockly.getMainWorkspace().render();
                }
            }, syncToBlocklyMsg: function (locale, messages) {
                // 確保 Blockly 和 Blockly.Msg 已經定義
                if (typeof Blockly !== 'undefined' && Blockly.Msg) {
                    // 使用標準化的日誌系統
                    if (window.log && window.log.info) {
                        window.log.info(`使用新的 setLocale API 同步 ${locale} 翻譯`, {
                            messageCount: Object.keys(messages).length,
                            timestamp: new Date().toISOString()
                        });
                    } else {
                        console.log(`使用新的 setLocale API 同步 ${locale} 翻譯`);
                    }

                    // 使用新的 Blockly.setLocale API (v11.2.0+)
                    try {
                        if (typeof Blockly.setLocale === 'function') {
                            Blockly.setLocale(messages);
                        } else {
                            // 回退到舊方法以保持向後兼容
                            for (const key in messages) {
                                Blockly.Msg[key] = messages[key];
                            }
                        }
                    } catch (error) {
                        console.warn('設定語言時發生錯誤，使用回退方法:', error);
                        // 回退到舊方法
                        for (const key in messages) {
                            Blockly.Msg[key] = messages[key];
                        }
                    }
                } else {
                    // 如果 Blockly 還未載入，設置一個短暫的延遲再試一次
                    setTimeout(() => {
                        this.syncToBlocklyMsg(locale, messages);
                    }, 200);
                }
            }
        };
    </script>
</head>

                        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
                            <path fill="currentColor"
                                d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                        </svg>
                    </button>
                </div>
                <div class="search-results-container">
                    <div id="searchResults" class="search-results">
                        <!-- 搜尋結果將在這裡動態添加 -->
                        <div class="empty-search-results" id="emptySearchMessage">尚未搜尋</div>
                    </div>
                </div>
                <div class="search-navigation" style="display: none;">
                    <button id="prevResultBtn" class="secondary-btn">上一個</button>
                    <span id="resultCounter">0/0</span>
                    <button id="nextResultBtn" class="secondary-btn">下一個</button>
                </div>
            </div>
        </div>
    </div>
    <!-- TXT 連線設定對話框 -->
    <div id="txtConnectionModal" class="modal">
        <div class="modal-content" style="max-width: 520px;">
            <div class="modal-header">
                <h2 id="txtConnectionPanelTitle">TXT Controller 連線設定</h2>
                <span class="modal-close" id="txtModalClose">&times;</span>
            </div>
            <div class="modal-body">
                <div
                    style="display: grid; grid-template-columns: auto 1fr; gap: 8px 12px; align-items: center; margin-bottom: 12px;">
                    <label for="txtHostInput" id="txtHostLabel">Host IP</label>
                    <input type="text" id="txtHostInput" placeholder="192.168.7.2"
                        style="background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); padding: 4px 8px; border-radius: 2px;">
                    <label for="txtUsernameInput" id="txtUsernameLabel">Username</label>
                    <input type="text" id="txtUsernameInput" placeholder="ftc"
                        style="background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); padding: 4px 8px; border-radius: 2px;">
                    <label for="txtPasswordInput" id="txtPasswordLabel">Password</label>
                    <input type="password" id="txtPasswordInput" placeholder="••••••••"
                        style="background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); padding: 4px 8px; border-radius: 2px;">
                    <label for="txtRemotePathInput" id="txtRemotePathLabel">Remote Path</label>
                    <input type="text" id="txtRemotePathInput" placeholder="/tmp/singular_blockly/main.py"
                        style="background: var(--vscode-input-background); color: var(--vscode-input-foreground); border: 1px solid var(--vscode-input-border); padding: 4px 8px; border-radius: 2px;">
                </div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button id="txtSaveConfigBtn" class="primary-btn" style="padding: 4px 12px;">儲存設定</button>
                    <button id="txtTestConnectionBtn" class="secondary-btn" style="padding: 4px 12px;">測試連線</button>
                    <span id="txtConnectionStatus" style="font-size: 0.85em;"></span>
                </div>
                <p id="txtSshHint" style="margin: 8px 0 0; font-size: 0.8rem; color: #888;"></p>
            </div>
        </div>
    </div>

    <!-- CyberBrick 範例瀏覽器對話框 -->
    <div id="sampleModal" class="modal" style="display: none;">
        <div class="modal-content sample-modal-content">
            <div class="modal-header">
                <h2 id="sampleModalTitle"></h2>
                <span class="modal-close" id="sampleModalClose">&times;</span>
            </div>
            <div class="modal-body">
                <!-- 離線提示橫幅 -->
                <div id="sampleOfflineNotice" class="sample-offline-notice" style="display: none;"></div>
                <!-- Loading Spinner -->
                <div id="sampleSpinner" class="sample-spinner">
                    <div class="spinner-circle"></div>
                    <p id="sampleLoadingText"></p>
                </div>
                <!-- 卡片容器 -->
                <div id="sampleCardContainer" class="sample-card-container"></div>
                <!-- 空清單提示 -->
                <div id="sampleEmptyNotice" class="sample-empty-notice" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- TXT I/O Test Panel Dialog -->
    <dialog id="txtTestPanelDialog">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="txtTestPanelTitle">TXT I/O Test Panel</h2>
                <div class="txt-test-status">
                    <span class="txt-test-status-dot" id="txtTestStatusDot"></span>
                    <span id="txtTestStatusText"></span>

                </div>
                <span class="modal-close" id="txtTestCloseBtn">&times;</span>
            </div>
            <div class="modal-body">
                <button class="txt-test-stop-all" id="txtTestStopAllBtn"></button>
                <section class="txt-test-section">
                    <h3 class="txt-test-section-title" id="txtTestMotorsTitle">Motors</h3>
                    <div class="txt-test-motors" id="txtTestMotors"></div>
                </section>
                <section class="txt-test-section">
                    <h3 class="txt-test-section-title" id="txtTestOutputsTitle">Outputs</h3>
                    <div class="txt-test-outputs" id="txtTestOutputs"></div>
                </section>
                <section class="txt-test-section">
                    <h3 class="txt-test-section-title" id="txtTestInputsTitle">Inputs</h3>
                    <div class="txt-test-inputs" id="txtTestInputs"></div>
                </section>
            </div>
        </div>
    </dialog>
